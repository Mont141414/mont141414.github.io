# These settings were set by the catalyst build script that automatically
# built this stage.
# Please consult /usr/share/portage/config/make.conf.example for a more
# detailed example.
COMMON_FLAGS="-O2 -pipe"
CFLAGS="${COMMON_FLAGS}"
CXXFLAGS="${COMMON_FLAGS}"
FCFLAGS="${COMMON_FLAGS}"
FFLAGS="${COMMON_FLAGS}"

INPUT_DEVICES="libinput synaptics"
MAKEOPTS="-j4"
VIDEO_CARDS="intel"
ACCEPT_LICENSE="*"

# FIRST ONE -> DISABLED DESKTOP ENVIRONMENTS AND RELATED
# SECOND ONE -> DISABLED SYSTEM AND SYSTEM SUPPORT RELATED
# THIRD ONE -> NEEDS

USE="-kde -gnome -xfce -gtk -X \
     -systemd -ibm -bluetooth -ios -ipod -coreaudio \
     wayland alsa pipewire pipewire-alsa dracut elogind"

# NOTE: This stage was built with the bindist Use flag enabled

# This sets the language of build output to English.
# Please keep this setting intact when reporting bugs.

LC_MESSAGES=C.utf8

GENTOO_MIRRORS="https://gentoo.c3sl.ufpr.br/"
