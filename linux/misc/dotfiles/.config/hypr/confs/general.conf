# General

general {
	border_size = 2
	gaps_in = 5
	gaps_out = 10
	col.inactive_border = $inactiveCol
	col.active_border = $activeCol
}


# Decoration

decoration {
	drop_shadow = false
	blur {
		enabled = false
	}
}


# Animations

animations {
	enabled = false
}


# Input

input {
	kb_layout = $kblayout
	force_no_accel = true
}


# Misc

misc {
	disable_hyprland_logo = true
	disable_splash_rendering = true
	force_default_wallpaper = 1
}
